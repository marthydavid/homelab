defaultNamespace: baby
dependsOn:
  - name: baby-fleet-baby-secrets
helm:
  releaseName: babybuddy
  chart: app-template
  repo: https://bjw-s.github.io/helm-charts
  version: 3.6.1
targetCustomizations:
- name: nas
  clusterSelector:
    matchLabels:
      provider.cattle.io: k3s
      topology.kubernetes.io/region: pecs
      topology.kubernetes.io/zone: nas
  helm:
    valuesFiles:
      - nas.yaml